services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - clinic_data:/data
      - clinic_media:/data/media
      - clinic_logs:/data/logs
      - clinic_diagnostics:/data/diagnostics
      - clinic_reports:/data/shared_reports
    restart: unless-stopped

volumes:
  clinic_data:
  clinic_media:
  clinic_logs:
  clinic_diagnostics:
  clinic_reports:
